<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC9News Live Bot V7</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;padding:25px}
.container{max-width:1150px;margin:auto}
.card{background:#1e293b;border-radius:18px;padding:22px;margin-top:18px}
button,select,input{padding:12px 16px;border-radius:10px;border:0;margin:6px;font-weight:bold}
button{background:#38bdf8;cursor:pointer}
.green{background:#22c55e}
.red{background:#ef4444;color:white}
.news{background:#020617;padding:18px;border-radius:14px;margin:14px 0}
a{color:#38bdf8}
small{color:#94a3b8}
.badge{display:inline-block;background:#16a34a;padding:5px 9px;border-radius:20px;font-size:12px;margin-left:6px}
.score{display:inline-block;background:#facc15;color:#111;padding:5px 9px;border-radius:20px;font-size:12px;margin:4px}
pre{white-space:pre-wrap;background:#111827;padding:12px;border-radius:10px;overflow:auto;font-size:13px}
</style>
</head>
<body>

<div class="container">
<h1>NYC9News Live Bot V7</h1>

<div class="card">
<select id="category">
<option value="New York City news">NYC Local News</option>
<option value="USA breaking news">USA Breaking News</option>
<option value="AI technology news USA">AI & Tech</option>
<option value="US business news">Business</option>
<option value="US finance news stock market Federal Reserve inflation">Finance</option>
<option value="US sports news">Sports</option>
<option value="NYC weather alert">Weather</option>
<option value="Moving to New York guide rent jobs cost of living">Moving To New York</option>
</select>

<input id="customTopic" placeholder="Search: Bitcoin, NYC Rent, Trump, AI">

<br>
<button onclick="loadNews()">Get Live News</button>
<button onclick="loadCustom()">Search Topic</button>
<button onclick="copyAll()" class="green">Copy All</button>
<button onclick="showSaved()">View Saved</button>
<button onclick="clearSaved()" class="red">Clear Saved</button>

<div id="output">Click “Get Live News” or search any topic.</div>
</div>
</div>

<script>
const trustedSources=[
"Reuters","AP News","Associated Press","BBC","CNN","CNBC","ABC News",
"CBS News","NBC News","USA Today","The New York Times","Fox News",
"Bloomberg","MarketWatch","Yahoo Finance","Investopedia","Forbes",
"Time","The Guardian","NPR","Axios","Politico","The Verge","TechCrunch",
"ABC7 New York","NBC New York","CBS New York","NY1","Gothamist"
];

const blockedSources=["facebook.com","YouTube","TikTok","Reddit","Quora","Medium","Instagram"];

let finalText="";
let lastResults=[];

async function loadCustom(){
  const topic=document.getElementById("customTopic").value.trim();
  if(!topic){alert("Topic લખ");return}
  await fetchNews(topic);
}

async function loadNews(){
  await fetchNews(document.getElementById("category").value);
}

async function fetchNews(q){
  const output=document.getElementById("output");
  output.innerHTML="Loading live trusted news...";
  finalText="";
  lastResults=[];

  const rssUrl=`https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`;
  const api=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

  try{
    const res=await fetch(api);
    const data=await res.json();

    if(!data.items || data.items.length===0){
      output.innerHTML="No news found. Try another topic.";
      return;
    }

    let html="";
    let count=0;

    data.items.forEach((item)=>{
      if(count>=10)return;

      const source=item.title.includes(" - ")?item.title.split(" - ").pop():"Google News";
      const cleanTitle=item.title.replace(/ - .+$/,"");

      if(blockedSources.some(b=>source.toLowerCase().includes(b.toLowerCase()))) return;

      const trusted=trustedSources.some(s=>source.toLowerCase().includes(s.toLowerCase()));
      if(!trusted && count>=5)return;

      count++;

      const seoTitle=makeSeoTitle(cleanTitle,q);
      const meta=makeMeta(cleanTitle,q);
      const angle=makeAngle(q);
      const photo=makePhotoKeyword(q);
      const tags=makeTags(q);
      const score=makeScore(q,trusted);
      const potential=makePotential(q);
      const competition=makeCompetition(q);
      const pexels=`https://www.pexels.com/search/${encodeURIComponent(photo)}/`;

      const articlePackage=makePackage(cleanTitle,item.link,seoTitle,meta,angle,photo,tags,q);

      const obj={title:cleanTitle,source,link:item.link,seoTitle,meta,angle,photo,tags,score,potential,competition,pexels,articlePackage};
      lastResults.push(obj);
      finalText+=articlePackage+"\n\n-----------------------------\n\n";

      html+=`
      <div class="news">
        <h3>${count}. ${cleanTitle}</h3>
        <small>Source: ${source}</small>
        ${trusted?'<span class="badge">Trusted</span>':''}
        <br><br>

        <span class="score">Score: ${score}/100</span>
        <span class="score">Traffic: ${potential}</span>
        <span class="score">Competition: ${competition}</span>

        <br><br><b>SEO Title:</b><br>${seoTitle}
        <br><br><b>Meta Description:</b><br>${meta}
        <br><br><b>Article Angle:</b><br>${angle}
        <br><br><b>Photo Keyword:</b><br>${photo}
        <br><a href="${pexels}" target="_blank">Open Pexels</a>
        <br><br><b>Tags:</b><br>${tags}

        <br><br><b>Full Article Package:</b>
        <pre>${articlePackage}</pre>

        <button class="green" onclick="saveTopic(${count-1})">Save Topic</button>
        <button onclick="copyOne(${count-1})">Copy This</button>
        <a href="${item.link}" target="_blank">Open Source</a>
      </div>`;
    });

    output.innerHTML=html || "No trusted headlines found. Try another topic.";

  }catch(e){
    output.innerHTML="Live news load નથી થતું. RSS API block/limit હોઈ શકે.";
  }
}

function makePackage(title,link,seoTitle,meta,angle,photo,tags,q){
return `NYC9NEWS ARTICLE PACKAGE

TOPIC:
${title}

SOURCE:
${link}

SEO TITLE:
${seoTitle}

META DESCRIPTION:
${meta}

MAIN KEYWORDS:
${tags}

ARTICLE ANGLE:
${angle}

FEATURED IMAGE KEYWORD:
${photo}

ARTICLE OUTLINE:
1. Quick Summary
2. What Happened
3. Why It Matters
4. Who Is Affected
5. What Happens Next
6. FAQ

FAQ IDEAS:
Q1. What happened?
Q2. Why does this matter?
Q3. Who is affected?
Q4. What happens next?
Q5. Where can readers get updates?

SOCIAL MEDIA POST:
${title}
Here’s what happened, why it matters, and what readers should know next. Read the full update on NYC9News.

YOUTUBE SHORT TITLE:
${shortTitle(title)}

YOUTUBE DESCRIPTION:
A quick explanation of ${title}. NYC9News breaks down what happened, why it matters, and what comes next.

IMAGE PROMPT:
Realistic editorial news photo style, ${photo}, natural lighting, documentary look, high quality, no text, no logo.

FULL ARTICLE PROMPT:
Write a 900-word original news article for NYC9News.

Use this topic:
${title}

Use this source for facts:
${link}

SEO Title:
${seoTitle}

Meta Description:
${meta}

Article Angle:
${angle}

Rules:
- Use simple American English.
- Do not copy the source.
- Keep it neutral and factual.
- Add a 2-line summary at the top.
- Include headings:
  What Happened
  Why It Matters
  Who Is Affected
  What Happens Next
  FAQ
- Make it useful for USA and NYC readers.
- End with: Follow NYC9News for simple USA and New York updates.`;
}

function shortTitle(title){
  return title.length>70 ? title.substring(0,70)+"..." : title+" Explained";
}

function saveTopic(index){
  const saved=JSON.parse(localStorage.getItem("nyc9_saved")||"[]");
  saved.push(lastResults[index]);
  localStorage.setItem("nyc9_saved",JSON.stringify(saved));
  alert("Saved!");
}

function showSaved(){
  const saved=JSON.parse(localStorage.getItem("nyc9_saved")||"[]");
  if(saved.length===0){
    document.getElementById("output").innerHTML="No saved topics.";
    return;
  }
  let html="<h2>Saved Topics</h2>";
  finalText="";
  saved.forEach((s,i)=>{
    finalText+=s.articlePackage+"\n\n-----------------------------\n\n";
    html+=`
    <div class="news">
      <h3>${i+1}. ${s.title}</h3>
      <b>SEO Title:</b><br>${s.seoTitle}<br><br>
      <b>Meta:</b><br>${s.meta}<br><br>
      <b>Photo:</b><br>${s.photo}<br>
      <a href="${s.pexels}" target="_blank">Open Pexels</a><br><br>
      <pre>${s.articlePackage}</pre>
      <a href="${s.link}" target="_blank">Open Source</a>
    </div>`;
  });
  document.getElementById("output").innerHTML=html;
}

function clearSaved(){
  localStorage.removeItem("nyc9_saved");
  document.getElementById("output").innerHTML="Saved topics cleared.";
}

function copyOne(index){
  navigator.clipboard.writeText(lastResults[index].articlePackage);
  alert("Copied this topic!");
}

function copyAll(){
  navigator.clipboard.writeText(finalText || document.getElementById("output").innerText);
  alert("Copied!");
}

function makeSeoTitle(title,q){
  const x=q.toLowerCase();
  if(x.includes("finance")||x.includes("stock")||x.includes("bitcoin")||x.includes("usd")) return title+" Explained: What It Means for Your Money";
  if(x.includes("new york")) return title+" Explained for New Yorkers";
  if(x.includes("ai")) return title+" Explained: What It Means for Jobs and Tech";
  if(x.includes("moving")) return title+" Guide: What Newcomers Should Know";
  return title+" Explained: What Readers Should Know";
}

function makeAngle(q){
  const x=q.toLowerCase();
  if(x.includes("finance")||x.includes("stock")||x.includes("bitcoin")||x.includes("usd")) return "Focus on money impact, markets, savings, loans, credit cards, inflation, and everyday Americans.";
  if(x.includes("new york")) return "Focus on NYC residents, commuters, rent, subway, safety, and daily life impact.";
  if(x.includes("ai")) return "Explain how this affects jobs, students, businesses, and future technology.";
  if(x.includes("business")) return "Explain business and consumer impact in simple language.";
  if(x.includes("sports")) return "Explain team/player impact and what fans should watch next.";
  if(x.includes("weather")) return "Explain affected areas, timing, travel impact, and safety tips.";
  if(x.includes("moving")) return "Make it useful for people planning to move to New York.";
  return "Explain what happened, why it matters, and how it affects Americans.";
}

function makePhotoKeyword(q){
  const x=q.toLowerCase();
  if(x.includes("finance")||x.includes("stock")||x.includes("bitcoin")||x.includes("usd")) return "Wall Street money stock market banking";
  if(x.includes("new york")) return "New York City subway street skyline";
  if(x.includes("ai")) return "AI technology laptop office";
  if(x.includes("business")) return "Wall Street business office";
  if(x.includes("sports")) return "sports stadium USA";
  if(x.includes("weather")) return "NYC weather street rain";
  if(x.includes("moving")) return "New York apartment skyline moving boxes";
  return "USA news city";
}

function makeMeta(title,q){
  if(q.toLowerCase().includes("finance")) return title+" explained in simple terms, including how it may affect markets, savings, loans and everyday money decisions.";
  return title+" explained with key facts, impact, and what readers should know next.";
}

function makeTags(q){
  const x=q.toLowerCase();
  if(x.includes("finance")||x.includes("stock")||x.includes("usd")) return "Finance, Stock Market, Federal Reserve, Inflation, Money, USA News";
  if(x.includes("new york")) return "NYC News, New York, Local News, USA News";
  if(x.includes("ai")) return "AI News, Technology, Jobs, USA Tech";
  if(x.includes("business")) return "Business, Economy, USA News";
  if(x.includes("sports")) return "Sports, USA Sports, Breaking News";
  if(x.includes("weather")) return "Weather, NYC Weather, Alerts";
  if(x.includes("moving")) return "Moving To New York, NYC Guide, Rent, Jobs, Cost of Living";
  return "USA News, Breaking News";
}

function makeScore(q,trusted){
  let score=60;
  const x=q.toLowerCase();
  if(trusted)score+=15;
  if(x.includes("finance")||x.includes("stock")||x.includes("usd"))score+=12;
  if(x.includes("new york"))score+=10;
  if(x.includes("ai"))score+=10;
  if(x.includes("moving"))score+=8;
  return Math.min(score,98);
}

function makePotential(q){
  const x=q.toLowerCase();
  if(x.includes("finance")||x.includes("moving"))return "High";
  if(x.includes("ai"))return "Medium-High";
  if(x.includes("new york"))return "Medium";
  return "Medium";
}

function makeCompetition(q){
  const x=q.toLowerCase();
  if(x.includes("moving"))return "Low-Medium";
  if(x.includes("finance"))return "High";
  if(x.includes("ai"))return "Medium";
  if(x.includes("new york"))return "Medium";
  return "High";
}
</script>
</body>
</html>

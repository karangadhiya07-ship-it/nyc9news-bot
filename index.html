<!DOCTYPE html>
<html>
<head>
<title>NYC9News Bot</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}
.card{
background:#222;
padding:20px;
border-radius:15px;
max-width:700px;
margin:auto;
}
button{
padding:12px 25px;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>NYC9News Bot</h1>

<div class="card">

<h2>Trending News Finder</h2>

<button onclick="generateNews()">
Find News Idea
</button>

<h3 id="title"></h3>
<p id="angle"></p>
<p id="photo"></p>

</div>

<script>

const ideas = [

{
title:"NYC Subway Delays Affect Thousands Today",
angle:"Explain why delays happened and how commuters are impacted.",
photo:"Photo Keyword: NYC Subway"
},

{
title:"New York Rent Prices Continue To Rise",
angle:"Focus on renters and housing affordability.",
photo:"Photo Keyword: NYC Apartment"
},

{
title:"AI Jobs Growing Fast Across America",
angle:"Discuss opportunities and future trends.",
photo:"Photo Keyword: AI Technology"
}

];

function generateNews(){

const item =
ideas[Math.floor(Math.random()*ideas.length)];

document.getElementById("title").innerHTML=item.title;
document.getElementById("angle").innerHTML=item.angle;
document.getElementById("photo").innerHTML=item.photo;

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC9News Live Bot V8</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;padding:25px}
.container{max-width:1150px;margin:auto}
.card{background:#1e293b;border-radius:18px;padding:22px;margin-top:18px}
button,select,input{padding:12px 16px;border-radius:10px;border:0;margin:6px;font-weight:bold}
button{background:#38bdf8;cursor:pointer}.green{background:#22c55e}.red{background:#ef4444;color:white}
.news{background:#020617;padding:18px;border-radius:14px;margin:14px 0}
a{color:#38bdf8}.badge{background:#16a34a;padding:5px 9px;border-radius:20px;font-size:12px}
.score{background:#facc15;color:#111;padding:5px 9px;border-radius:20px;font-size:12px;margin:4px;display:inline-block}
pre{white-space:pre-wrap;background:#111827;padding:12px;border-radius:10px;overflow:auto;font-size:13px}
img{width:100%;max-height:330px;object-fit:cover;border-radius:14px;margin:12px 0}
small{color:#94a3b8}
</style>
</head>
<body>
<div class="container">
<h1>NYC9News Live Bot V8</h1>

<div class="card">
<select id="category">
<option value="New York City news">NYC Local News</option>
<option value="USA breaking news">USA Breaking News</option>
<option value="AI technology news USA">AI & Tech</option>
<option value="US business news">Business</option>
<option value="US finance news stock market Federal Reserve inflation">Finance</option>
<option value="US sports news">Sports</option>
<option value="NYC weather alert">Weather</option>
<option value="Moving to New York guide rent jobs cost of living">Moving To New York</option>
</select>

<input id="customTopic" placeholder="Search: Bitcoin, NYC Rent, Trump, AI">

<br>
<button onclick="loadNews()">Get Live News</button>
<button onclick="loadCustom()">Search Topic</button>
<button onclick="copyAll()" class="green">Copy All</button>
<button onclick="showSaved()">View Saved</button>
<button onclick="clearSaved()" class="red">Clear Saved</button>

<div id="output">Click “Get Live News” or search any topic.</div>
</div>
</div>

<script>
const trustedSources=["Reuters","AP News","BBC","CNN","CNBC","ABC News","CBS News","NBC News","USA Today","The New York Times","Fox News","Bloomberg","MarketWatch","Yahoo Finance","Investopedia","Forbes","Time","NPR","Axios","Politico","The Verge","TechCrunch","ABC7 New York","NBC New York","CBS New York","NY1","Gothamist"];
const blockedSources=["facebook.com","YouTube","TikTok","Reddit","Quora","Medium","Instagram"];
let finalText="",lastResults=[];

async function loadCustom(){const t=document.getElementById("customTopic").value.trim();if(!t){alert("Topic લખ");return} await fetchNews(t)}
async function loadNews(){await fetchNews(document.getElementById("category").value)}

async function fetchNews(q){
const output=document.getElementById("output");
output.innerHTML="Loading live news + safe real images...";
finalText="";lastResults=[];
const rss=`https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`;
const api=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`;
try{
const res=await fetch(api);const data=await res.json();
if(!data.items){output.innerHTML="No news found.";return}
let html="",count=0;
for(const item of data.items){
 if(count>=8)break;
 const source=item.title.includes(" - ")?item.title.split(" - ").pop():"Google News";
 const title=item.title.replace(/ - .+$/,"");
 if(blockedSources.some(b=>source.toLowerCase().includes(b.toLowerCase())))continue;
 const trusted=trustedSources.some(s=>source.toLowerCase().includes(s.toLowerCase()));
 if(!trusted && count>=4)continue;
 count++;
 const photo=makePhotoKeyword(q);
 const img=await getWikimediaImage(photo);
 const seo=makeSeoTitle(title,q),meta=makeMeta(title,q),angle=makeAngle(q),tags=makeTags(q);
 const score=makeScore(q,trusted),potential=makePotential(q),competition=makeCompetition(q);
 const pack=makePackage(title,item.link,seo,meta,angle,photo,tags,img);
 lastResults.push({title,source,link:item.link,seo,meta,angle,photo,tags,img,pack});
 finalText+=pack+"\n\n----------------------\n\n";
 html+=`
 <div class="news">
 <h3>${count}. ${title}</h3>
 <small>Source: ${source}</small> ${trusted?'<span class="badge">Trusted</span>':''}<br><br>
 <span class="score">Score: ${score}/100</span>
 <span class="score">Traffic: ${potential}</span>
 <span class="score">Competition: ${competition}</span>
 ${img.url?`<img src="${img.url}"><small>Image: ${img.credit} | <a href="${img.page}" target="_blank">Image Source</a></small>`:`<p>No safe image found. Use Pexels/Unsplash manually.</p>`}
 <br><br><b>SEO Title:</b><br>${seo}
 <br><br><b>Meta:</b><br>${meta}
 <br><br><b>Angle:</b><br>${angle}
 <br><br><b>Tags:</b><br>${tags}
 <br><br><pre>${pack}</pre>
 <button class="green" onclick="saveTopic(${count-1})">Save Topic</button>
 <button onclick="copyOne(${count-1})">Copy This</button>
 <a href="${item.link}" target="_blank">Open Source</a>
 </div>`;
}
output.innerHTML=html || "No trusted headlines found.";
}catch(e){output.innerHTML="Live load failed. RSS/API limit હોઈ શકે."}
}

async function getWikimediaImage(keyword){
try{
const url=`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(keyword)}&gsrnamespace=6&gsrlimit=1&prop=imageinfo&iiprop=url|extmetadata&origin=*&format=json`;
const res=await fetch(url);const data=await res.json();
if(!data.query||!data.query.pages)return {url:"",credit:"",page:""};
const page=Object.values(data.query.pages)[0];
const info=page.imageinfo?.[0];
const credit=info?.extmetadata?.Artist?.value?.replace(/<[^>]*>/g,"") || "Wikimedia Commons";
return {url:info.url,credit:credit,page:"https://commons.wikimedia.org/wiki/"+encodeURIComponent(page.title.replace("File:","File:"))};
}catch(e){return {url:"",credit:"",page:""}}
}

function makePackage(title,link,seo,meta,angle,photo,tags,img){
return `NYC9NEWS ARTICLE PACKAGE

TOPIC:
${title}

SOURCE:
${link}

SEO TITLE:
${seo}

META DESCRIPTION:
${meta}

MAIN KEYWORDS:
${tags}

ARTICLE ANGLE:
${angle}

SAFE IMAGE:
${img.url || "No image found"}
IMAGE CREDIT:
${img.credit || "N/A"}
IMAGE SOURCE:
${img.page || "N/A"}

ARTICLE OUTLINE:
1. Quick Summary
2. What Happened
3. Why It Matters
4. Who Is Affected
5. What Happens Next
6. FAQ

FULL ARTICLE PROMPT:
Write a 900-word original news article for NYC9News.
Use simple American English.
Do not copy the source.
Use neutral and factual tone.
Include: What Happened, Why It Matters, Who Is Affected, What Happens Next, FAQ.
End with: Follow NYC9News for simple USA and New York updates.`;
}

function saveTopic(i){let s=JSON.parse(localStorage.getItem("nyc9_saved")||"[]");s.push(lastResults[i]);localStorage.setItem("nyc9_saved",JSON.stringify(s));alert("Saved!")}
function showSaved(){let s=JSON.parse(localStorage.getItem("nyc9_saved")||"[]");document.getElementById("output").innerHTML=s.length?s.map((x,i)=>`<div class="news"><h3>${i+1}. ${x.title}</h3>${x.img?.url?`<img src="${x.img.url}">`:""}<pre>${x.pack}</pre></div>`).join(""):"No saved topics."}
function clearSaved(){localStorage.removeItem("nyc9_saved");document.getElementById("output").innerHTML="Saved cleared."}
function copyOne(i){navigator.clipboard.writeText(lastResults[i].pack);alert("Copied!")}
function copyAll(){navigator.clipboard.writeText(finalText);alert("Copied!")}

function makeSeoTitle(t,q){let x=q.toLowerCase();if(x.includes("finance")||x.includes("stock")||x.includes("bitcoin")||x.includes("usd"))return t+" Explained: What It Means for Your Money";if(x.includes("new york"))return t+" Explained for New Yorkers";if(x.includes("ai"))return t+" Explained: What It Means for Jobs and Tech";return t+" Explained: What Readers Should Know"}
function makeAngle(q){let x=q.toLowerCase();if(x.includes("finance")||x.includes("stock")||x.includes("bitcoin")||x.includes("usd"))return "Focus on money impact, markets, savings, loans, credit cards, inflation, and everyday Americans.";if(x.includes("new york"))return "Focus on NYC residents, commuters, rent, subway, safety, and daily life impact.";if(x.includes("ai"))return "Explain how this affects jobs, students, businesses, and future technology.";return "Explain what happened, why it matters, and how it affects Americans."}
function makePhotoKeyword(q){let x=q.toLowerCase();if(x.includes("finance")||x.includes("stock")||x.includes("bitcoin")||x.includes("usd"))return "Wall Street stock market";if(x.includes("new york"))return "New York City skyline";if(x.includes("ai"))return "Artificial intelligence technology";if(x.includes("weather"))return "New York weather";return "United States news"}
function makeMeta(t,q){return t+" explained with key facts, impact, and what readers should know next."}
function makeTags(q){let x=q.toLowerCase();if(x.includes("finance")||x.includes("stock"))return "Finance, Stock Market, Money, USA News";if(x.includes("new york"))return "NYC News, New York, Local News";if(x.includes("ai"))return "AI News, Technology, Jobs";return "USA News, Breaking News"}
function makeScore(q,trusted){let s=60;if(trusted)s+=15;if(q.toLowerCase().includes("finance"))s+=12;if(q.toLowerCase().includes("new york"))s+=10;if(q.toLowerCase().includes("ai"))s+=10;return Math.min(s,98)}
function makePotential(q){let x=q.toLowerCase();if(x.includes("finance"))return"High";if(x.includes("ai"))return"Medium-High";return"Medium"}
function makeCompetition(q){let x=q.toLowerCase();if(x.includes("finance"))return"High";if(x.includes("new york"))return"Medium";return"High"}
</script>
</body>
</html>

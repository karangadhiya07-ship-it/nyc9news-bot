<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC9News Live Bot</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;padding:25px}
.container{max-width:950px;margin:auto}
.card{background:#1e293b;border-radius:18px;padding:22px;margin-top:18px}
button,select{padding:12px 16px;border-radius:10px;border:0;margin:6px;font-weight:bold}
button{background:#38bdf8;cursor:pointer}
.news{background:#020617;padding:15px;border-radius:14px;margin:12px 0}
a{color:#38bdf8}
small{color:#94a3b8}
</style>
</head>
<body>

<div class="container">
<h1>NYC9News Live Bot</h1>

<div class="card">
<select id="category">
<option value="New York City news">NYC Local News</option>
<option value="USA breaking news">USA Breaking News</option>
<option value="AI technology news USA">AI & Tech</option>
<option value="US business news">Business</option>
<option value="US sports news">Sports</option>
<option value="NYC weather alert">Weather</option>
<option value="Moving to New York guide">Moving To New York</option>
</select>

<button onclick="loadNews()">Get Live News</button>

<div id="output">Click “Get Live News” to fetch latest headlines.</div>
</div>
</div>

<script>
async function loadNews(){
  const q = document.getElementById("category").value;
  const output = document.getElementById("output");
  output.innerHTML = "Loading live news...";

  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`;

  const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

  try{
    const res = await fetch(api);
    const data = await res.json();

    if(!data.items || data.items.length === 0){
      output.innerHTML = "No news found. Try another category.";
      return;
    }

    let html = "";

    data.items.slice(0,10).forEach((item,index)=>{
      const cleanTitle = item.title.replace(/ - .+$/,"");
      const source = item.title.includes(" - ") ? item.title.split(" - ").pop() : "Google News";

      html += `
      <div class="news">
        <h3>${index+1}. ${cleanTitle}</h3>
        <small>Source: ${source}</small><br><br>

        <b>Suggested SEO Title:</b><br>
        ${makeSeoTitle(cleanTitle)}<br><br>

        <b>Article Angle:</b><br>
        ${makeAngle(q)}<br><br>

        <b>Photo Keyword:</b><br>
        ${makePhotoKeyword(q)}<br><br>

        <b>Article Structure:</b><br>
        1. Quick Summary<br>
        2. What Happened<br>
        3. Why It Matters<br>
        4. Who Is Affected<br>
        5. What Happens Next<br>
        6. FAQ<br><br>

        <a href="${item.link}" target="_blank">Open Source</a>
      </div>
      `;
    });

    output.innerHTML = html;

  }catch(error){
    output.innerHTML = "Live news load નથી થતું. RSS API block/limit હોઈ શકે.";
  }
}

function makeSeoTitle(title){
  return title + " Explained: What Readers Should Know";
}

function makeAngle(q){
  if(q.includes("New York City")) return "Focus on NYC residents, commuters, safety, rent, subway, and daily life impact.";
  if(q.includes("AI")) return "Explain how this affects jobs, students, businesses, and future technology.";
  if(q.includes("business")) return "Explain money impact in simple language for normal people.";
  if(q.includes("sports")) return "Explain match/team impact and what fans should watch next.";
  if(q.includes("weather")) return "Explain affected areas, timing, travel impact, and safety tips.";
  if(q.includes("Moving")) return "Make it useful for people planning to move to New York.";
  return "Explain what happened, why it matters, and how it affects Americans.";
}

function makePhotoKeyword(q){
  if(q.includes("New York City")) return "New York City street, subway, skyline";
  if(q.includes("AI")) return "AI technology laptop";
  if(q.includes("business")) return "Wall Street business";
  if(q.includes("sports")) return "sports stadium USA";
  if(q.includes("weather")) return "NYC weather street";
  if(q.includes("Moving")) return "New York apartment skyline";
  return "USA news city";
}
</script>

</body>
</html>

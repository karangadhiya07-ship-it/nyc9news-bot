<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC9News Live Bot V5</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;padding:25px}
.container{max-width:1050px;margin:auto}
.card{background:#1e293b;border-radius:18px;padding:22px;margin-top:18px}
button,select{padding:12px 16px;border-radius:10px;border:0;margin:6px;font-weight:bold}
button{background:#38bdf8;cursor:pointer}
.news{background:#020617;padding:18px;border-radius:14px;margin:14px 0}
a{color:#38bdf8}
small{color:#94a3b8}
.badge{display:inline-block;background:#16a34a;padding:5px 9px;border-radius:20px;font-size:12px;margin-left:6px}
.score{display:inline-block;background:#facc15;color:#111;padding:5px 9px;border-radius:20px;font-size:12px;margin:4px}
.copyBtn{background:#22c55e}
</style>
</head>
<body>

<div class="container">
<h1>NYC9News Live Bot V5</h1>

<div class="card">
<select id="category">
<option value="New York City news">NYC Local News</option>
<option value="USA breaking news">USA Breaking News</option>
<option value="AI technology news USA">AI & Tech</option>
<option value="US business news">Business</option>
<option value="US finance news stock market Federal Reserve inflation">Finance</option>
<option value="US sports news">Sports</option>
<option value="NYC weather alert">Weather</option>
<option value="Moving to New York guide rent jobs cost of living">Moving To New York</option>
</select>

<button onclick="loadNews()">Get Live News</button>
<button onclick="copyAll()" class="copyBtn">Copy All Prompts</button>

<div id="output">Click “Get Live News” to fetch latest trusted headlines.</div>
</div>
</div>

<script>
const trustedSources=[
"Reuters","AP News","Associated Press","BBC","CNN","CNBC","ABC News",
"CBS News","NBC News","USA Today","The New York Times","Fox News",
"Bloomberg","MarketWatch","Yahoo Finance","Investopedia","Forbes",
"Time","The Guardian","NPR","Axios","Politico","The Verge","TechCrunch",
"ABC7 New York","NBC New York","CBS New York","NY1","Gothamist"
];

const blockedSources=[
"facebook.com","YouTube","TikTok","Reddit","Quora","Medium","Instagram"
];

let finalText="";

async function loadNews(){
  const q=document.getElementById("category").value;
  const output=document.getElementById("output");
  output.innerHTML="Loading live trusted news...";
  finalText="";

  const rssUrl=`https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`;
  const api=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

  try{
    const res=await fetch(api);
    const data=await res.json();

    if(!data.items || data.items.length===0){
      output.innerHTML="No news found. Try another category.";
      return;
    }

    let html="";
    let count=0;

    data.items.forEach((item)=>{
      if(count>=10)return;

      const source=item.title.includes(" - ")?item.title.split(" - ").pop():"Google News";
      const cleanTitle=item.title.replace(/ - .+$/,"");

      if(blockedSources.some(b=>source.toLowerCase().includes(b.toLowerCase()))) return;

      const trusted=trustedSources.some(s=>source.toLowerCase().includes(s.toLowerCase()));
      if(!trusted && count>=5) return;

      count++;

      const seoTitle=makeSeoTitle(cleanTitle,q);
      const angle=makeAngle(q);
      const photo=makePhotoKeyword(q);
      const meta=makeMeta(cleanTitle,q);
      const tags=makeTags(q);
      const score=makeScore(q,trusted);
      const potential=makePotential(q);
      const competition=makeCompetition(q);
      const pexels=`https://www.pexels.com/search/${encodeURIComponent(photo)}/`;

      const articlePrompt=
`Write a 700-word original news article for NYC9News.

Topic:
${cleanTitle}

Source:
${item.link}

SEO Title:
${seoTitle}

Meta Description:
${meta}

Main Keyword:
${tags.split(",")[0]}

Photo Keyword:
${photo}

Article Angle:
${angle}

Rules:
- Use simple American English.
- Do not copy the source article.
- Write original wording.
- Add a 2-line summary at the top.
- Include sections:
  1. What happened
  2. Why it matters
  3. Who is affected
  4. What happens next
  5. FAQ
- Keep tone neutral and factual.
- Make it useful for USA/NYC readers.
`;

      const block=
`TOPIC ${count}: ${cleanTitle}

SOURCE: ${source}
LINK: ${item.link}

TRENDING SCORE: ${score}/100
TRAFFIC POTENTIAL: ${potential}
COMPETITION: ${competition}

SEO TITLE:
${seoTitle}

META DESCRIPTION:
${meta}

ARTICLE ANGLE:
${angle}

PHOTO KEYWORD:
${photo}
PEXELS PHOTO SEARCH:
${pexels}

TAGS:
${tags}

FULL ARTICLE PROMPT:
${articlePrompt}

-----------------------------
`;

      finalText+=block;

      html+=`
      <div class="news">
        <h3>${count}. ${cleanTitle}</h3>
        <small>Source: ${source}</small>
        ${trusted?'<span class="badge">Trusted</span>':''}
        <br><br>

        <span class="score">Trending Score: ${score}/100</span>
        <span class="score">Traffic: ${potential}</span>
        <span class="score">Competition: ${competition}</span>

        <br><br>
        <b>SEO Title:</b><br>${seoTitle}<br><br>
        <b>Meta Description:</b><br>${meta}<br><br>
        <b>Article Angle:</b><br>${angle}<br><br>
        <b>Photo Keyword:</b><br>${photo}<br>
        <a href="${pexels}" target="_blank">Open Pexels Photos</a><br><br>
        <b>Tags:</b><br>${tags}<br><br>

        <b>Full Article Prompt:</b><br>
        <pre style="white-space:pre-wrap;background:#111827;padding:12px;border-radius:10px">${articlePrompt}</pre>

        <a href="${item.link}" target="_blank">Open Source</a>
      </div>`;
    });

    output.innerHTML=html || "No trusted headlines found. Try another category.";

  }catch(e){
    output.innerHTML="Live news load નથી થતું. RSS API block/limit હોઈ શકે.";
  }
}

function makeSeoTitle(title,q){
  if(q.includes("finance")) return title+" Explained: What It Means for Your Money";
  if(q.includes("New York")) return title+" Explained for New Yorkers";
  if(q.includes("AI")) return title+" Explained: What It Means for Jobs and Tech";
  if(q.includes("Moving")) return title+" Guide: What Newcomers Should Know";
  return title+" Explained: What Readers Should Know";
}

function makeAngle(q){
  if(q.includes("finance")) return "Focus on money impact, markets, savings, loans, credit cards, inflation, and everyday Americans.";
  if(q.includes("New York City")) return "Focus on NYC residents, commuters, safety, rent, subway, and daily life impact.";
  if(q.includes("AI")) return "Explain how this affects jobs, students, businesses, and future technology.";
  if(q.includes("business")) return "Explain business and consumer impact in simple language.";
  if(q.includes("sports")) return "Explain team/player impact and what fans should watch next.";
  if(q.includes("weather")) return "Explain affected areas, timing, travel impact, and safety tips.";
  if(q.includes("Moving")) return "Make it useful for people planning to move to New York.";
  return "Explain what happened, why it matters, and how it affects Americans.";
}

function makePhotoKeyword(q){
  if(q.includes("finance")) return "Wall Street money stock market banking";
  if(q.includes("New York City")) return "New York City subway street skyline";
  if(q.includes("AI")) return "AI technology laptop office";
  if(q.includes("business")) return "Wall Street business office";
  if(q.includes("sports")) return "sports stadium USA";
  if(q.includes("weather")) return "NYC weather street rain";
  if(q.includes("Moving")) return "New York apartment skyline moving boxes";
  return "USA news city";
}

function makeMeta(title,q){
  if(q.includes("finance")) return title+" explained in simple terms, including how it may affect markets, savings, loans and everyday money decisions.";
  if(q.includes("Moving")) return title+" guide for people planning to move to New York, including cost, jobs, rent and daily life tips.";
  return title+" explained with key facts, impact, and what readers should know next.";
}

function makeTags(q){
  if(q.includes("finance")) return "Finance, Stock Market, Federal Reserve, Inflation, Money, USA News";
  if(q.includes("New York City")) return "NYC News, New York, Local News, USA News";
  if(q.includes("AI")) return "AI News, Technology, Jobs, USA Tech";
  if(q.includes("business")) return "Business, Economy, USA News";
  if(q.includes("sports")) return "Sports, USA Sports, Breaking News";
  if(q.includes("weather")) return "Weather, NYC Weather, Alerts";
  if(q.includes("Moving")) return "Moving To New York, NYC Guide, Rent, Jobs, Cost of Living";
  return "USA News, Breaking News";
}

function makeScore(q,trusted){
  let score=60;
  if(trusted) score+=15;
  if(q.includes("finance")) score+=12;
  if(q.includes("New York City")) score+=10;
  if(q.includes("AI")) score+=10;
  if(q.includes("Moving")) score+=8;
  return Math.min(score,98);
}

function makePotential(q){
  if(q.includes("finance")) return "High";
  if(q.includes("Moving")) return "High";
  if(q.includes("AI")) return "Medium-High";
  if(q.includes("New York City")) return "Medium";
  return "Medium";
}

function makeCompetition(q){
  if(q.includes("Moving")) return "Low-Medium";
  if(q.includes("finance")) return "High";
  if(q.includes("AI")) return "Medium";
  if(q.includes("New York City")) return "Medium";
  return "High";
}

function copyAll(){
  navigator.clipboard.writeText(finalText || document.getElementById("output").innerText);
  alert("Copied!");
}
</script>

</body>
</html>
